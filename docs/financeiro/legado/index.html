<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legado — Financeiro — Vero</title>
    <link rel="stylesheet" href="{CSS_URL}">
    <style>
        body {
            padding: 2rem 1rem;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--ink);
        }
        .breadcrumb {
            color: var(--ink-light);
            margin-bottom: 2rem;
        }
        .breadcrumb a {
            color: var(--ink);
            text-decoration: none;
        }
        .blocos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .bloco-item {
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .bloco-item a {
            color: var(--ink);
            text-decoration: none;
        }
        .bloco-item a:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="breadcrumb">
        <a href="/vero-apostila/">Home</a> /
        <a href="/vero-apostila/financeiro/">Financeiro</a> /
        <span>Legado</span>
    </div>
    
    <h1>Legado — Financeiro</h1>
    
    <div class="blocos">
            <li><a href="/vero-apostila/financeiro/legado/bloco-17/">Bloco 17</a></li>
            <li><a href="/vero-apostila/financeiro/legado/bloco-18/">Bloco 18</a></li>
            <li><a href="/vero-apostila/financeiro/legado/bloco-19/">Bloco 19</a></li>
            <li><a href="/vero-apostila/financeiro/legado/bloco-20/">Bloco 20</a></li>
            <li><a href="/vero-apostila/financeiro/legado/bloco-21/">Bloco 21</a></li>
            <li><a href="/vero-apostila/financeiro/legado/bloco-22/">Bloco 22</a></li>
    </div>
</body>
</html>
