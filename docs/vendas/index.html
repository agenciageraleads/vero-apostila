<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas — Vero Apostila</title>
    <link rel="stylesheet" href="/vero-apostila/assets/css/estilo.css">
    <style>
        body {
            padding: 2rem 1rem;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--ink);
            margin-bottom: 2rem;
        }
        .breadcrumb {
            color: var(--ink-light);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .breadcrumb a {
            color: var(--ink);
            text-decoration: none;
        }
        .breadcrumb a:hover {
            color: var(--gold);
        }
        .fases {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }
        .fase-section {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 8px;
        }
        .fase-section h3 {
            color: var(--ink);
            border-bottom: 2px solid var(--gold);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .bloco-list {
            list-style: none;
            padding: 0;
        }
        .bloco-list li {
            margin-bottom: 0.5rem;
        }
        .bloco-list a {
            color: var(--ink);
            text-decoration: none;
            padding: 0.5rem;
            display: block;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }
        .bloco-list a:hover {
            border-left-color: var(--gold);
            padding-left: 1rem;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="breadcrumb">
        <a href="/vero-apostila/">← Voltar para Home</a>
    </div>

    <h1>Vendas</h1>

    <div class="fases">

    <div class="fase-section">
        <h3>Raiz</h3>
        <ul class="bloco-list">
        </ul>
    </div>

    <div class="fase-section">
        <h3>Trilha</h3>
        <ul class="bloco-list">
        </ul>
    </div>

    <div class="fase-section">
        <h3>Gestao</h3>
        <ul class="bloco-list">
        </ul>
    </div>

    <div class="fase-section">
        <h3>Legado</h3>
        <ul class="bloco-list">
        </ul>
    </div>

    </div>
</body>
</html>
